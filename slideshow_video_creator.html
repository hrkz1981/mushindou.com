<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 音楽スライドショー動画作成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .step {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 4px solid #4facfe;
        }

        .step h2 {
            margin-bottom: 15px;
            color: #4facfe;
            font-size: 1.3rem;
        }

        .file-input {
            display: none;
        }

        .file-label {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            display: inline-block;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-right: 15px;
        }

        .file-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin: 5px;
            min-width: 140px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-generate {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .setting-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .setting-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #4facfe;
        }

        .setting-item select,
        .setting-item input[type="range"] {
            width: 100%;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .canvas-container {
            position: relative;
            text-align: center;
            margin: 20px 0;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #slideCanvas {
            width: 100%;
            height: 500px;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f23 100%);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .status {
            text-align: center;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            font-weight: bold;
        }

        .status.info {
            background: rgba(33, 150, 243, 0.2);
            color: #64b5f6;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }

        .status.success {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .status.error {
            background: rgba(244, 67, 54, 0.2);
            color: #e57373;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .status.loading {
            background: rgba(255, 193, 7, 0.2);
            color: #ffcc02;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .lyrics-display {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            margin: 20px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 10;
        }

        .image-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .image-preview img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .image-preview img.current {
            border-color: #4facfe;
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.5);
        }

        .download-section {
            text-align: center;
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-top: 20px;
        }

        .download-btn {
            background: linear-gradient(135deg, #00d2d3 0%, #54a0ff 100%);
            font-size: 1.3rem;
            padding: 15px 40px;
            margin: 10px;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
            }

            .settings-grid {
                grid-template-columns: 1fr;
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 音楽スライドショー動画</h1>
        <p class="subtitle">音楽に合わせてランダム画像が切り替わる美しい動画を作成</p>
        
        <div class="step">
            <h2>ステップ1: 音楽ファイル選択</h2>
            <input type="file" id="audioFile" class="file-input" accept=".wav,.mp3" />
            <label for="audioFile" class="file-label">
                🎵 音楽ファイルを選択
            </label>
            <p id="fileName" style="margin-top: 10px; display: none;"></p>
        </div>

        <div class="step">
            <h2>ステップ2: スライドショー設定</h2>
            <div class="settings-grid">
                <div class="setting-item">
                    <label for="imageTheme">画像テーマ</label>
                    <select id="imageTheme">
                        <option value="nature">自然・風景</option>
                        <option value="city">都市・街並み</option>
                        <option value="abstract">アブストラクト</option>
                        <option value="space">宇宙・星空</option>
                        <option value="flowers">花・植物</option>
                        <option value="ocean">海・水</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="transitionStyle">切り替え効果</label>
                    <select id="transitionStyle">
                        <option value="fade">フェード</option>
                        <option value="slide">スライド</option>
                        <option value="zoom">ズーム</option>
                        <option value="dissolve">ディゾルブ</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="imageInterval">画像切り替え間隔: <span id="intervalValue">4</span>秒</label>
                    <input type="range" id="imageInterval" min="2" max="10" value="4">
                </div>
                <div class="setting-item">
                    <label for="imageCount">使用画像数</label>
                    <select id="imageCount">
                        <option value="10">10枚</option>
                        <option value="20" selected>20枚</option>
                        <option value="30">30枚</option>
                        <option value="50">50枚</option>
                    </select>
                </div>
            </div>
            
            <div style="margin-top: 20px;">
                <button id="generateBtn" class="btn btn-generate" disabled>🎨 画像を取得してスライドショー生成</button>
            </div>
        </div>

        <div class="step">
            <h2>ステップ3: プレビュー</h2>
            <div class="canvas-container">
                <canvas id="slideCanvas" width="1000" height="600"></canvas>
            </div>
            
            <div class="lyrics-display" id="lyricsDisplay">
                歌詞がここに表示されます
            </div>

            <div class="controls">
                <button id="playBtn" class="btn" disabled>▶️ 再生</button>
                <button id="pauseBtn" class="btn" disabled>⏸️ 一時停止</button>
                <button id="stopBtn" class="btn" disabled>⏹️ 停止</button>
            </div>

            <div id="status" class="status info">音楽ファイルを選択してください</div>

            <div class="image-preview" id="imagePreview" style="display: none;">
                <!-- 取得した画像のプレビューがここに表示されます -->
            </div>
        </div>

        <div class="download-section">
            <h2>ステップ4: 動画保存</h2>
            <p style="margin-bottom: 20px;">画面録画ツールを使用して動画として保存してください</p>
            <button id="screenshotBtn" class="btn download-btn" disabled>
                📸 現在のフレームを画像保存
            </button>
            <div style="margin-top: 15px; font-size: 0.9rem; opacity: 0.8;">
                <p>💡 動画として保存する方法：</p>
                <p>• macOS: QuickTime Player で画面録画</p>
                <p>• Windows: Xbox Game Bar (Win+G)</p>
                <p>• Chrome: 画面録画拡張機能</p>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" style="display: none;"></audio>

    <script>
        class SlideshowVideoCreator {
            constructor() {
                this.audioFile = null;
                this.audioPlayer = document.getElementById('audioPlayer');
                this.canvas = document.getElementById('slideCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.images = [];
                this.currentImageIndex = 0;
                this.lyricsData = [];
                this.currentLyricIndex = -1;
                this.animationId = null;
                this.intervalId = null;
                this.transitionProgress = 0;
                this.isTransitioning = false;
                
                this.initializeElements();
                this.setupEventListeners();
                this.initializeCanvas();
            }

            initializeElements() {
                this.elements = {
                    audioFileInput: document.getElementById('audioFile'),
                    fileName: document.getElementById('fileName'),
                    generateBtn: document.getElementById('generateBtn'),
                    playBtn: document.getElementById('playBtn'),
                    pauseBtn: document.getElementById('pauseBtn'),
                    stopBtn: document.getElementById('stopBtn'),
                    screenshotBtn: document.getElementById('screenshotBtn'),
                    status: document.getElementById('status'),
                    lyricsDisplay: document.getElementById('lyricsDisplay'),
                    imagePreview: document.getElementById('imagePreview'),
                    imageTheme: document.getElementById('imageTheme'),
                    transitionStyle: document.getElementById('transitionStyle'),
                    imageInterval: document.getElementById('imageInterval'),
                    imageCount: document.getElementById('imageCount'),
                    intervalValue: document.getElementById('intervalValue')
                };
            }

            setupEventListeners() {
                this.elements.audioFileInput.addEventListener('change', (e) => this.handleFileSelect(e));
                this.elements.generateBtn.addEventListener('click', () => this.generateSlideshow());
                this.elements.playBtn.addEventListener('click', () => this.playPause());
                this.elements.pauseBtn.addEventListener('click', () => this.pause());
                this.elements.stopBtn.addEventListener('click', () => this.stop());
                this.elements.screenshotBtn.addEventListener('click', () => this.takeScreenshot());
                
                this.elements.imageInterval.addEventListener('input', (e) => {
                    this.elements.intervalValue.textContent = e.target.value;
                });
                
                this.audioPlayer.addEventListener('timeupdate', () => this.updateDisplay());
                this.audioPlayer.addEventListener('ended', () => this.handleAudioEnd());
            }

            initializeCanvas() {
                this.drawWelcomeScreen();
            }

            drawWelcomeScreen() {
                // グラデーション背景
                const gradient = this.ctx.createLinearGradient(0, 0, this.canvas.width, this.canvas.height);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');
                
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // タイトル
                this.ctx.fillStyle = '#fff';
                this.ctx.font = 'bold 36px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.ctx.fillText('音楽スライドショー動画', this.canvas.width / 2, this.canvas.height / 2 - 50);
                
                this.ctx.font = '20px Arial';
                this.ctx.fillText('音楽ファイルを選択して開始', this.canvas.width / 2, this.canvas.height / 2 + 20);
            }

            handleFileSelect(event) {
                const file = event.target.files[0];
                if (file && file.type.includes('audio')) {
                    this.audioFile = file;
                    const url = URL.createObjectURL(file);
                    this.audioPlayer.src = url;
                    
                    this.elements.fileName.textContent = `選択されたファイル: ${file.name}`;
                    this.elements.fileName.style.display = 'block';
                    this.elements.generateBtn.disabled = false;
                    this.updateStatus('success', 'ファイルが選択されました。画像を取得してスライドショーを生成してください。');
                } else {
                    this.updateStatus('error', '対応する音声ファイルを選択してください');
                }
            }

            async generateSlideshow() {
                this.updateStatus('loading', '画像を取得中... <div class="loading-spinner"></div>');
                this.elements.generateBtn.disabled = true;
                
                try {
                    // 歌詞データを生成
                    await this.generateLyrics();
                    
                    // 画像を取得
                    await this.fetchRandomImages();
                    
                    // スライドショーの準備
                    this.setupSlideshow();
                    
                    this.elements.playBtn.disabled = false;
                    this.elements.pauseBtn.disabled = false;
                    this.elements.stopBtn.disabled = false;
                    this.elements.screenshotBtn.disabled = false;
                    
                    this.updateStatus('success', 'スライドショー生成完了！再生して確認してください。');
                    
                } catch (error) {
                    console.error('Slideshow generation error:', error);
                    this.updateStatus('error', 'スライドショー生成に失敗しました。');
                    this.elements.generateBtn.disabled = false;
                }
            }

            async generateLyrics() {
                const duration = this.audioPlayer.duration || 120;
                const lyrics = [
                    '美しい風景が心を癒す',
                    '音楽と共に流れる時間',
                    '記憶の中の大切な場所',
                    '季節が運んでくる想い',
                    '新しい景色への憧れ',
                    '静寂の中に響く調べ',
                    '光と影が織りなす詩',
                    '遠い空に響く歌声',
                    '今この瞬間を大切に',
                    '永遠に続く物語'
                ];

                const segmentDuration = duration / lyrics.length;
                this.lyricsData = lyrics.map((text, index) => ({
                    startTime: index * segmentDuration,
                    endTime: (index + 1) * segmentDuration,
                    text: text
                }));
            }

            async fetchRandomImages() {
                const theme = this.elements.imageTheme.value;
                const count = parseInt(this.elements.imageCount.value);
                
                this.images = [];
                const imagePromises = [];
                
                // ランダム画像を生成（デモ用）
                for (let i = 0; i < count; i++) {
                    imagePromises.push(this.createRandomImage(theme, i));
                }
                
                this.images = await Promise.all(imagePromises);
                this.displayImagePreview();
            }

            async createRandomImage(theme, index) {
                return new Promise((resolve) => {
                    // 高解像度キャンバス（4Kサイズ）
                    const canvas = document.createElement('canvas');
                    canvas.width = 1920;  // フルHD+
                    canvas.height = 1080; // フルHD+
                    const ctx = canvas.getContext('2d');
                    
                    // 高品質レンダリング設定
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    
                    // テーマに応じた高品質画像生成
                    this.generateHighQualityImage(ctx, canvas, theme, index);
                    
                    // キャンバスを高品質画像に変換
                    const img = new Image();
                    img.onload = () => resolve(img);
                    // 高品質JPEG（品質90%）
                    img.src = canvas.toDataURL('image/jpeg', 0.9);
                });
            }

            generateHighQualityImage(ctx, canvas, theme, index) {
                const colors = this.getThemeColors(theme);
                
                // 背景レイヤー1: 複数グラデーション
                this.drawMultiLayerGradients(ctx, canvas, colors);
                
                // 背景レイヤー2: パーリンノイズ風テクスチャ
                this.drawNoiseTexture(ctx, canvas, theme);
                
                // メインレイヤー: テーマ別アートワーク
                switch(theme) {
                    case 'nature':
                        this.drawNatureScene(ctx, canvas, colors);
                        break;
                    case 'city':
                        this.drawCityscape(ctx, canvas, colors);
                        break;
                    case 'space':
                        this.drawSpaceScene(ctx, canvas, colors);
                        break;
                    case 'ocean':
                        this.drawOceanScene(ctx, canvas, colors);
                        break;
                    case 'abstract':
                        this.drawAbstractArt(ctx, canvas, colors);
                        break;
                    case 'flowers':
                        this.drawFloralPattern(ctx, canvas, colors);
                        break;
                    default:
                        this.drawAbstractArt(ctx, canvas, colors);
                }
                
                // 仕上げレイヤー: 光と影の効果
                this.drawLightingEffects(ctx, canvas);
                
                // 最終調整: フィルター効果
                this.applyImageFilters(ctx, canvas, theme);
            }

            drawMultiLayerGradients(ctx, canvas, colors) {
                // 複数の放射状グラデーションを重ね合わせ
                for (let i = 0; i < 3; i++) {
                    const centerX = (Math.random() - 0.2) * canvas.width * 1.4;
                    const centerY = (Math.random() - 0.2) * canvas.height * 1.4;
                    const maxRadius = Math.max(canvas.width, canvas.height) * (0.8 + Math.random() * 0.4);
                    
                    const gradient = ctx.createRadialGradient(
                        centerX, centerY, 0,
                        centerX, centerY, maxRadius
                    );
                    
                    const color1 = colors[Math.floor(Math.random() * colors.length)];
                    const color2 = colors[Math.floor(Math.random() * colors.length)];
                    const color3 = colors[Math.floor(Math.random() * colors.length)];
                    
                    gradient.addColorStop(0, color1 + (i === 0 ? 'FF' : '80'));
                    gradient.addColorStop(0.5, color2 + (i === 0 ? 'CC' : '60'));
                    gradient.addColorStop(1, color3 + (i === 0 ? '99' : '40'));
                    
                    ctx.globalCompositeOperation = i === 0 ? 'source-over' : 'multiply';
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                ctx.globalCompositeOperation = 'source-over';
            }

            drawNoiseTexture(ctx, canvas, theme) {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                // パーリンノイズ風のテクスチャを追加
                for (let x = 0; x < canvas.width; x += 4) {
                    for (let y = 0; y < canvas.height; y += 4) {
                        const index = (y * canvas.width + x) * 4;
                        
                        // 複数のオクターブでノイズを生成
                        let noise = 0;
                        let amplitude = 1;
                        let frequency = 0.005;
                        
                        for (let oct = 0; oct < 4; oct++) {
                            noise += this.noise(x * frequency, y * frequency) * amplitude;
                            amplitude *= 0.5;
                            frequency *= 2;
                        }
                        
                        const intensity = (noise + 1) * 0.5 * 30; // 0-30の範囲
                        
                        if (index < data.length - 3) {
                            data[index] = Math.min(255, data[index] + intensity);
                            data[index + 1] = Math.min(255, data[index + 1] + intensity);
                            data[index + 2] = Math.min(255, data[index + 2] + intensity);
                        }
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
            }

            drawNatureScene(ctx, canvas, colors) {
                // 山のシルエット
                ctx.fillStyle = colors[0] + 'AA';
                ctx.beginPath();
                ctx.moveTo(0, canvas.height * 0.7);
                for (let x = 0; x <= canvas.width; x += 20) {
                    const y = canvas.height * 0.7 - Math.sin(x * 0.01) * 150 - Math.random() * 100;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(canvas.width, canvas.height);
                ctx.lineTo(0, canvas.height);
                ctx.fill();
                
                // 木々のシルエット
                for (let i = 0; i < 15; i++) {
                    const x = Math.random() * canvas.width;
                    const height = 100 + Math.random() * 200;
                    this.drawTree(ctx, x, canvas.height - height, height, colors[1] + 'CC');
                }
                
                // 太陽/月
                const sunX = canvas.width * (0.2 + Math.random() * 0.6);
                const sunY = canvas.height * (0.1 + Math.random() * 0.3);
                const sunGradient = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 80);
                sunGradient.addColorStop(0, '#FFF8DC');
                sunGradient.addColorStop(1, colors[2] + '80');
                ctx.fillStyle = sunGradient;
                ctx.beginPath();
                ctx.arc(sunX, sunY, 80, 0, Math.PI * 2);
                ctx.fill();
            }

            drawCityscape(ctx, canvas, colors) {
                // ビルのシルエット
                for (let x = 0; x < canvas.width; x += 40 + Math.random() * 60) {
                    const buildingWidth = 30 + Math.random() * 80;
                    const buildingHeight = 200 + Math.random() * 400;
                    const buildingY = canvas.height - buildingHeight;
                    
                    // グラデーションビル
                    const buildingGradient = ctx.createLinearGradient(x, buildingY, x + buildingWidth, buildingY);
                    buildingGradient.addColorStop(0, colors[Math.floor(Math.random() * colors.length)] + 'DD');
                    buildingGradient.addColorStop(1, colors[Math.floor(Math.random() * colors.length)] + '99');
                    
                    ctx.fillStyle = buildingGradient;
                    ctx.fillRect(x, buildingY, buildingWidth, buildingHeight);
                    
                    // 窓の光
                    for (let wx = x + 5; wx < x + buildingWidth - 10; wx += 15) {
                        for (let wy = buildingY + 20; wy < canvas.height - 20; wy += 25) {
                            if (Math.random() > 0.6) {
                                ctx.fillStyle = '#FFFF99' + (Math.random() > 0.5 ? 'FF' : 'AA');
                                ctx.fillRect(wx, wy, 8, 12);
                            }
                        }
                    }
                }
            }

            drawSpaceScene(ctx, canvas, colors) {
                // 星々
                ctx.fillStyle = '#FFFFFF';
                for (let i = 0; i < 200; i++) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height * 0.7;
                    const size = Math.random() * 3;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 星の輝き効果
                    if (Math.random() > 0.8) {
                        ctx.strokeStyle = '#FFFFFF80';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(x - size * 3, y);
                        ctx.lineTo(x + size * 3, y);
                        ctx.moveTo(x, y - size * 3);
                        ctx.lineTo(x, y + size * 3);
                        ctx.stroke();
                    }
                }
                
                // 惑星
                const planetX = canvas.width * (0.3 + Math.random() * 0.4);
                const planetY = canvas.height * (0.3 + Math.random() * 0.3);
                const planetRadius = 80 + Math.random() * 120;
                
                const planetGradient = ctx.createRadialGradient(
                    planetX - planetRadius * 0.3, planetY - planetRadius * 0.3, 0,
                    planetX, planetY, planetRadius
                );
                planetGradient.addColorStop(0, colors[0]);
                planetGradient.addColorStop(0.7, colors[1]);
                planetGradient.addColorStop(1, colors[2] + 'CC');
                
                ctx.fillStyle = planetGradient;
                ctx.beginPath();
                ctx.arc(planetX, planetY, planetRadius, 0, Math.PI * 2);
                ctx.fill();
            }

            drawOceanScene(ctx, canvas, colors) {
                // 波のレイヤー
                for (let layer = 0; layer < 5; layer++) {
                    const waveHeight = canvas.height * (0.8 - layer * 0.1);
                    const amplitude = 30 + layer * 20;
                    const frequency = 0.01 + layer * 0.002;
                    
                    ctx.fillStyle = colors[layer % colors.length] + (255 - layer * 30).toString(16);
                    ctx.beginPath();
                    ctx.moveTo(0, waveHeight);
                    
                    for (let x = 0; x <= canvas.width; x += 5) {
                        const y = waveHeight + Math.sin(x * frequency + layer) * amplitude;
                        ctx.lineTo(x, y);
                    }
                    
                    ctx.lineTo(canvas.width, canvas.height);
                    ctx.lineTo(0, canvas.height);
                    ctx.fill();
                }
                
                // 泡や光の効果
                for (let i = 0; i < 50; i++) {
                    const x = Math.random() * canvas.width;
                    const y = canvas.height * 0.6 + Math.random() * canvas.height * 0.4;
                    const size = Math.random() * 10 + 2;
                    
                    ctx.fillStyle = '#FFFFFF' + Math.floor(Math.random() * 100 + 50).toString(16);
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            drawAbstractArt(ctx, canvas, colors) {
                // フラクタル風パターン
                for (let i = 0; i < 8; i++) {
                    const centerX = Math.random() * canvas.width;
                    const centerY = Math.random() * canvas.height;
                    const branches = 6 + Math.floor(Math.random() * 6);
                    
                    this.drawFractalPattern(ctx, centerX, centerY, 150, branches, colors, 4);
                }
                
                // 幾何学的な形状
                for (let i = 0; i < 12; i++) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    const size = 20 + Math.random() * 80;
                    const rotation = Math.random() * Math.PI * 2;
                    
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(rotation);
                    
                    const gradient = ctx.createLinearGradient(-size, -size, size, size);
                    gradient.addColorStop(0, colors[Math.floor(Math.random() * colors.length)] + 'AA');
                    gradient.addColorStop(1, colors[Math.floor(Math.random() * colors.length)] + '66');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(-size/2, -size/2, size, size);
                    ctx.restore();
                }
            }

            drawFloralPattern(ctx, canvas, colors) {
                // 花びら風の模様
                for (let i = 0; i < 20; i++) {
                    const centerX = Math.random() * canvas.width;
                    const centerY = Math.random() * canvas.height;
                    const petalCount = 5 + Math.floor(Math.random() * 8);
                    const size = 40 + Math.random() * 100;
                    
                    for (let petal = 0; petal < petalCount; petal++) {
                        const angle = (petal / petalCount) * Math.PI * 2;
                        const petalX = centerX + Math.cos(angle) * size * 0.7;
                        const petalY = centerY + Math.sin(angle) * size * 0.7;
                        
                        const petalGradient = ctx.createRadialGradient(
                            petalX, petalY, 0,
                            petalX, petalY, size * 0.5
                        );
                        petalGradient.addColorStop(0, colors[petal % colors.length] + 'DD');
                        petalGradient.addColorStop(1, colors[petal % colors.length] + '44');
                        
                        ctx.fillStyle = petalGradient;
                        ctx.beginPath();
                        ctx.ellipse(petalX, petalY, size * 0.3, size * 0.6, angle, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    // 花の中心
                    const centerGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 15);
                    centerGradient.addColorStop(0, '#FFFF99');
                    centerGradient.addColorStop(1, colors[0] + 'CC');
                    ctx.fillStyle = centerGradient;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, 15, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            drawTree(ctx, x, y, height, color) {
                // 幹
                ctx.fillStyle = color;
                ctx.fillRect(x - 3, y, 6, height);
                
                // 葉っぱ
                const leafGradient = ctx.createRadialGradient(x, y - height * 0.7, 0, x, y - height * 0.7, height * 0.4);
                leafGradient.addColorStop(0, color);
                leafGradient.addColorStop(1, color + '00');
                ctx.fillStyle = leafGradient;
                ctx.beginPath();
                ctx.arc(x, y - height * 0.7, height * 0.4, 0, Math.PI * 2);
                ctx.fill();
            }

            drawFractalPattern(ctx, x, y, size, branches, colors, depth) {
                if (depth <= 0 || size < 5) return;
                
                const angleStep = (Math.PI * 2) / branches;
                const color = colors[depth % colors.length];
                
                for (let i = 0; i < branches; i++) {
                    const angle = i * angleStep;
                    const endX = x + Math.cos(angle) * size;
                    const endY = y + Math.sin(angle) * size;
                    
                    // 線を描画
                    ctx.strokeStyle = color + Math.floor(255 * (depth / 4)).toString(16).padStart(2, '0');
                    ctx.lineWidth = depth;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                    
                    // 再帰的に小さなパターンを描画
                    if (Math.random() > 0.4) {
                        this.drawFractalPattern(ctx, endX, endY, size * 0.6, branches, colors, depth - 1);
                    }
                }
            }

            drawLightingEffects(ctx, canvas) {
                // ソフトな光の効果
                const lightGradient = ctx.createRadialGradient(
                    canvas.width * 0.3, canvas.height * 0.2, 0,
                    canvas.width * 0.3, canvas.height * 0.2, Math.max(canvas.width, canvas.height) * 0.8
                );
                lightGradient.addColorStop(0, '#FFFFFF20');
                lightGradient.addColorStop(0.3, '#FFFFFF10');
                lightGradient.addColorStop(1, '#FFFFFF00');
                
                ctx.globalCompositeOperation = 'screen';
                ctx.fillStyle = lightGradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.globalCompositeOperation = 'source-over';
            }

            applyImageFilters(ctx, canvas, theme) {
                // 色調補正とコントラスト調整
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                for (let i = 0; i < data.length; i += 4) {
                    // コントラストを上げる
                    const contrast = 1.2;
                    data[i] = Math.min(255, ((data[i] / 255 - 0.5) * contrast + 0.5) * 255);
                    data[i + 1] = Math.min(255, ((data[i + 1] / 255 - 0.5) * contrast + 0.5) * 255);
                    data[i + 2] = Math.min(255, ((data[i + 2] / 255 - 0.5) * contrast + 0.5) * 255);
                    
                    // 彩度を少し上げる
                    const saturation = 1.1;
                    const gray = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    data[i] = Math.min(255, gray + (data[i] - gray) * saturation);
                    data[i + 1] = Math.min(255, gray + (data[i + 1] - gray) * saturation);
                    data[i + 2] = Math.min(255, gray + (data[i + 2] - gray) * saturation);
                }
                
                ctx.putImageData(imageData, 0, 0);
            }

            // シンプルなノイズ関数
            noise(x, y) {
                const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
                return 2 * (n - Math.floor(n)) - 1;
            }

            getThemeColors(theme) {
                const colorThemes = {
                    nature: ['#2E8B57', '#32CD32', '#228B22', '#9ACD32', '#8FBC8F'],
                    city: ['#708090', '#2F4F4F', '#696969', '#778899', '#B0C4DE'],
                    abstract: ['#FF1493', '#00CED1', '#FF69B4', '#1E90FF', '#FFD700'],
                    space: ['#191970', '#0000FF', '#4169E1', '#6A5ACD', '#9370DB'],
                    flowers: ['#FF69B4', '#FFB6C1', '#FFA07A', '#FF6347', '#FF1493'],
                    ocean: ['#4682B4', '#5F9EA0', '#6495ED', '#00CED1', '#48D1CC']
                };
                
                return colorThemes[theme] || colorThemes.nature;
            }

            displayImagePreview() {
                this.elements.imagePreview.style.display = 'grid';
                this.elements.imagePreview.innerHTML = '';
                
                this.images.forEach((img, index) => {
                    const previewImg = document.createElement('img');
                    previewImg.src = img.src;
                    previewImg.dataset.index = index;
                    previewImg.addEventListener('click', () => {
                        this.currentImageIndex = index;
                        this.drawCurrentFrame();
                        this.updateImagePreview();
                    });
                    this.elements.imagePreview.appendChild(previewImg);
                });
            }

            updateImagePreview() {
                const previewImages = this.elements.imagePreview.querySelectorAll('img');
                previewImages.forEach((img, index) => {
                    img.classList.toggle('current', index === this.currentImageIndex);
                });
            }

            setupSlideshow() {
                this.currentImageIndex = 0;
                this.drawCurrentFrame();
                this.updateImagePreview();
            }

            playPause() {
                if (this.audioPlayer.paused) {
                    this.audioPlayer.play();
                    this.startSlideshow();
                    this.elements.playBtn.textContent = '⏸️ 一時停止';
                } else {
                    this.audioPlayer.pause();
                    this.stopSlideshow();
                    this.elements.playBtn.textContent = '▶️ 再生';
                }
            }

            pause() {
                this.audioPlayer.pause();
                this.stopSlideshow();
                this.elements.playBtn.textContent = '▶️ 再生';
            }

            stop() {
                this.audioPlayer.pause();
                this.audioPlayer.currentTime = 0;
                this.stopSlideshow();
                this.currentImageIndex = 0;
                this.currentLyricIndex = -1;
                this.elements.playBtn.textContent = '▶️ 再生';
                this.elements.lyricsDisplay.textContent = '歌詞がここに表示されます';
                this.drawCurrentFrame();
                this.updateImagePreview();
            }

            startSlideshow() {
                const interval = parseInt(this.elements.imageInterval.value) * 1000;
                
                this.intervalId = setInterval(() => {
                    this.nextImage();
                }, interval);
                
                this.startAnimation();
            }

            stopSlideshow() {
                if (this.intervalId) {
                    clearInterval(this.intervalId);
                    this.intervalId = null;
                }
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }

            nextImage() {
                if (this.images.length === 0) return;
                
                this.isTransitioning = true;
                this.transitionProgress = 0;
                
                // 次の画像インデックス
                this.currentImageIndex = (this.currentImageIndex + 1) % this.images.length;
                this.updateImagePreview();
            }

            startAnimation() {
                const animate = () => {
                    if (!this.audioPlayer.paused) {
                        this.updateDisplay();
                        this.drawCurrentFrame();
                        this.animationId = requestAnimationFrame(animate);
                    }
                };
                animate();
            }

            drawCurrentFrame() {
                if (this.images.length === 0) return;
                
                const currentImg = this.images[this.currentImageIndex];
                
                if (this.isTransitioning && this.transitionProgress < 1) {
                    this.drawTransition();
                } else {
                    this.drawImage(currentImg);
                    this.isTransitioning = false;
                }
                
                this.drawLyrics();
            }

            drawImage(img) {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 画像をキャンバス全体に描画（アスペクト比を維持）
                const scale = Math.max(
                    this.canvas.width / img.width,
                    this.canvas.height / img.height
                );
                
                const scaledWidth = img.width * scale;
                const scaledHeight = img.height * scale;
                const x = (this.canvas.width - scaledWidth) / 2;
                const y = (this.canvas.height - scaledHeight) / 2;
                
                this.ctx.drawImage(img, x, y, scaledWidth, scaledHeight);
            }

            drawTransition() {
                const transitionStyle = this.elements.transitionStyle.value;
                const currentImg = this.images[this.currentImageIndex];
                const prevIndex = (this.currentImageIndex - 1 + this.images.length) % this.images.length;
                const prevImg = this.images[prevIndex];
                
                this.transitionProgress += 0.02;
                
                switch (transitionStyle) {
                    case 'fade':
                        this.drawFadeTransition(prevImg, currentImg);
                        break;
                    case 'slide':
                        this.drawSlideTransition(prevImg, currentImg);
                        break;
                    case 'zoom':
                        this.drawZoomTransition(currentImg);
                        break;
                    default:
                        this.drawFadeTransition(prevImg, currentImg);
                }
            }

            drawFadeTransition(prevImg, currentImg) {
                this.drawImage(prevImg);
                this.ctx.globalAlpha = this.transitionProgress;
                this.drawImage(currentImg);
                this.ctx.globalAlpha = 1;
            }

            drawSlideTransition(prevImg, currentImg) {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                const offset = this.canvas.width * this.transitionProgress;
                
                this.ctx.save();
                this.ctx.translate(-offset, 0);
                this.drawImage(prevImg);
                this.ctx.restore();
                
                this.ctx.save();
                this.ctx.translate(this.canvas.width - offset, 0);
                this.drawImage(currentImg);
                this.ctx.restore();
            }

            drawZoomTransition(currentImg) {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                const scale = 0.5 + (this.transitionProgress * 0.5);
                const width = this.canvas.width * scale;
                const height = this.canvas.height * scale;
                const x = (this.canvas.width - width) / 2;
                const y = (this.canvas.height - height) / 2;
                
                this.ctx.drawImage(currentImg, x, y, width, height);
            }

            drawLyrics() {
                const currentTime = this.audioPlayer.currentTime;
                let currentLyric = null;
                
                for (const lyric of this.lyricsData) {
                    if (currentTime >= lyric.startTime && currentTime < lyric.endTime) {
                        currentLyric = lyric;
                        break;
                    }
                }
                
                if (currentLyric) {
                    // 半透明の背景
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, this.canvas.height - 100, this.canvas.width, 100);
                    
                    // 歌詞テキスト
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 28px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(currentLyric.text, this.canvas.width / 2, this.canvas.height - 50);
                }
            }

            updateDisplay() {
                this.updateLyrics();
            }

            updateLyrics() {
                const currentTime = this.audioPlayer.currentTime;
                let currentLyric = null;
                
                for (const lyric of this.lyricsData) {
                    if (currentTime >= lyric.startTime && currentTime < lyric.endTime) {
                        currentLyric = lyric;
                        break;
                    }
                }
                
                if (currentLyric) {
                    this.elements.lyricsDisplay.textContent = currentLyric.text;
                } else {
                    this.elements.lyricsDisplay.textContent = '♪ ♪ ♪';
                }
            }

            takeScreenshot() {
                const link = document.createElement('a');
                link.download = `slideshow-frame-${Date.now()}.png`;
                link.href = this.canvas.toDataURL();
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                this.updateStatus('success', 'フレーム画像を保存しました！');
            }

            handleAudioEnd() {
                this.stop();
            }

            updateStatus(type, message) {
                this.elements.status.className = `status ${type}`;
                this.elements.status.innerHTML = message;
            }
        }

        // アプリ初期化
        document.addEventListener('DOMContentLoaded', () => {
            new SlideshowVideoCreator();
        });
    </script>
</body>
