<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音楽動画クリエイター - 歌詞同期ビジュアライザー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .main-content {
            padding: 30px;
        }

        .controls-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .controls-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }

        .file-input {
            display: none;
        }

        .file-label {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .file-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(79, 172, 254, 0.4);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-record {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
        }

        .btn-export {
            background: linear-gradient(135deg, #00d2d3 0%, #54a0ff 100%);
        }

        .video-canvas-container {
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #videoCanvas {
            width: 100%;
            height: 400px;
            display: block;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f23 100%);
        }

        .audio-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .progress-container {
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            overflow: hidden;
            height: 6px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .time-display {
            text-align: center;
            font-size: 1.1rem;
            margin: 10px 0;
            color: #fff;
        }

        .status {
            text-align: center;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            font-weight: bold;
        }

        .status.info {
            background: rgba(33, 150, 243, 0.2);
            color: #64b5f6;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }

        .status.success {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .status.recording {
            background: rgba(244, 67, 54, 0.2);
            color: #e57373;
            border: 1px solid rgba(244, 67, 54, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .settings-panel {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .settings-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .setting-item {
            flex: 1;
            min-width: 200px;
        }

        .setting-item label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .setting-item input,
        .setting-item select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 0.9rem;
        }

        .setting-item input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .lyrics-preview {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .lyrics-preview h3 {
            margin-bottom: 15px;
            color: #4facfe;
        }

        .lyric-item {
            padding: 8px 15px;
            margin: 5px 0;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .lyric-item.active {
            background: rgba(79, 172, 254, 0.3);
            border-left-color: #4facfe;
            transform: translateX(5px);
        }

        @media (max-width: 768px) {
            .controls-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                max-width: none;
            }

            .settings-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 音楽動画クリエイター</h1>
            <p>歌詞と音楽に同期した美しいビジュアル動画を自動生成</p>
        </div>

        <div class="main-content">
            <!-- ファイル選択とコントロール -->
            <div class="controls-section">
                <div class="controls-row">
                    <div class="file-input-wrapper">
                        <input type="file" id="audioFile" class="file-input" accept=".wav,.mp3" />
                        <label for="audioFile" class="file-label">
                            🎵 音楽ファイルを選択
                        </label>
                    </div>
                    <button id="analyzeBtn" class="btn" disabled>🔍 歌詞解析</button>
                    <button id="generateVideoBtn" class="btn" disabled>🎬 動画生成</button>
                </div>

                <div class="controls-row">
                    <button id="playBtn" class="btn" disabled>▶️ 再生</button>
                    <button id="pauseBtn" class="btn" disabled>⏸️ 一時停止</button>
                    <button id="stopBtn" class="btn" disabled>⏹️ 停止</button>
                    <button id="recordBtn" class="btn btn-record" disabled>🎥 録画開始</button>
                    <button id="exportBtn" class="btn btn-export" disabled>💾 動画保存</button>
                </div>
            </div>

            <!-- ビデオキャンバス -->
            <div class="video-canvas-container">
                <canvas id="videoCanvas" width="1280" height="720"></canvas>
            </div>

            <!-- 進行状況 -->
            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <div id="timeDisplay" class="time-display">00:00 / 00:00</div>

            <!-- ステータス -->
            <div id="status" class="status info">
                🎯 音楽ファイルを選択してください
            </div>

            <!-- 設定パネル -->
            <div class="settings-panel">
                <h3>🎨 ビジュアル設定</h3>
                <div class="settings-row">
                    <div class="setting-item">
                        <label for="visualTheme">ビジュアルテーマ</label>
                        <select id="visualTheme">
                            <option value="spectrum">スペクトラム</option>
                            <option value="waveform">波形</option>
                            <option value="particles">パーティクル</option>
                            <option value="gradient">グラデーション</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="colorScheme">カラーテーマ</label>
                        <select id="colorScheme">
                            <option value="blue">ブルー</option>
                            <option value="purple">パープル</option>
                            <option value="rainbow">レインボー</option>
                            <option value="fire">ファイア</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label for="fontSize">フォントサイズ</label>
                        <input type="range" id="fontSize" min="20" max="80" value="40">
                    </div>
                </div>
                <div class="settings-row">
                    <div class="setting-item">
                        <label for="backgroundImage">背景画像URL（オプション）</label>
                        <input type="text" id="backgroundImage" placeholder="https://example.com/image.jpg">
                    </div>
                </div>
            </div>

            <!-- 歌詞プレビュー -->
            <div class="lyrics-preview">
                <h3>🎤 歌詞プレビュー</h3>
                <div id="lyricsDisplay">
                    歌詞解析を実行すると、ここに歌詞が表示されます
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" style="display: none;"></audio>

    <script>
        class MusicVideoCreator {
            constructor() {
                this.audioFile = null;
                this.audioPlayer = document.getElementById('audioPlayer');
                this.canvas = document.getElementById('videoCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.lyricsData = [];
                this.currentLyricIndex = -1;
                this.isRecording = false;
                this.recordedChunks = [];
                this.mediaRecorder = null;
                this.audioContext = null;
                this.analyser = null;
                this.frequencyData = null;
                this.animationId = null;
                
                this.initializeElements();
                this.setupEventListeners();
                this.initializeCanvas();
            }

            initializeElements() {
                this.elements = {
                    audioFileInput: document.getElementById('audioFile'),
                    analyzeBtn: document.getElementById('analyzeBtn'),
                    generateVideoBtn: document.getElementById('generateVideoBtn'),
                    playBtn: document.getElementById('playBtn'),
                    pauseBtn: document.getElementById('pauseBtn'),
                    stopBtn: document.getElementById('stopBtn'),
                    recordBtn: document.getElementById('recordBtn'),
                    exportBtn: document.getElementById('exportBtn'),
                    progressBar: document.getElementById('progressBar'),
                    timeDisplay: document.getElementById('timeDisplay'),
                    status: document.getElementById('status'),
                    lyricsDisplay: document.getElementById('lyricsDisplay'),
                    visualTheme: document.getElementById('visualTheme'),
                    colorScheme: document.getElementById('colorScheme'),
                    fontSize: document.getElementById('fontSize'),
                    backgroundImage: document.getElementById('backgroundImage')
                };
            }

            setupEventListeners() {
                this.elements.audioFileInput.addEventListener('change', (e) => this.handleFileSelect(e));
                this.elements.analyzeBtn.addEventListener('click', () => this.analyzeLyrics());
                this.elements.generateVideoBtn.addEventListener('click', () => this.generateVideo());
                this.elements.playBtn.addEventListener('click', () => this.playPause());
                this.elements.pauseBtn.addEventListener('click', () => this.pause());
                this.elements.stopBtn.addEventListener('click', () => this.stop());
                this.elements.recordBtn.addEventListener('click', () => this.toggleRecording());
                this.elements.exportBtn.addEventListener('click', () => this.exportVideo());
                
                this.audioPlayer.addEventListener('timeupdate', () => this.updateProgress());
                this.audioPlayer.addEventListener('ended', () => this.handleAudioEnd());
                this.audioPlayer.addEventListener('loadedmetadata', () => this.updateDuration());
                
                // 設定変更の監視
                this.elements.visualTheme.addEventListener('change', () => this.updateVisualSettings());
                this.elements.colorScheme.addEventListener('change', () => this.updateVisualSettings());
                this.elements.fontSize.addEventListener('input', () => this.updateVisualSettings());
            }

            initializeCanvas() {
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 初期メッセージ
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '24px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText('音楽ファイルを選択してください', this.canvas.width / 2, this.canvas.height / 2);
            }

            handleFileSelect(event) {
                const file = event.target.files[0];
                if (file && (file.type.includes('audio'))) {
                    this.audioFile = file;
                    const url = URL.createObjectURL(file);
                    this.audioPlayer.src = url;
                    
                    this.elements.analyzeBtn.disabled = false;
                    this.updateStatus('success', `✅ ファイル選択完了: ${file.name}`);
                } else {
                    this.updateStatus('error', '❌ 対応する音声ファイルを選択してください');
                }
            }

            async analyzeLyrics() {
                this.updateStatus('info', '🔍 歌詞解析中...');
                
                try {
                    // 簡易的な歌詞生成（実際の音声認識は複雑なため）
                    await this.generateLyricsFromAudio();
                    this.displayLyrics();
                    this.elements.generateVideoBtn.disabled = false;
                    this.updateStatus('success', '✅ 歌詞解析完了');
                } catch (error) {
                    console.error('Lyrics analysis error:', error);
                    this.updateStatus('error', '❌ 歌詞解析に失敗しました');
                }
            }

            async generateLyricsFromAudio() {
                const duration = this.audioPlayer.duration || 180;
                const sampleLyrics = [
                    '星空を見上げて',
                    '君の笑顔を思い出す',
                    '風が運んでくれた',
                    '懐かしいメロディー',
                    '今日という日を',
                    '大切に歩んでいこう',
                    '夢を追いかけて',
                    '明日へと続く道',
                    '手を取り合って',
                    '歩いていこう',
                    '永遠の歌声と共に',
                    '新しい物語が始まる'
                ];

                const segmentDuration = duration / sampleLyrics.length;
                this.lyricsData = sampleLyrics.map((lyric, index) => ({
                    startTime: index * segmentDuration,
                    endTime: (index + 1) * segmentDuration,
                    text: lyric
                }));
            }

            displayLyrics() {
                const lyricsHtml = this.lyricsData.map((lyric, index) => {
                    const timeStr = this.formatTime(lyric.startTime);
                    return `<div class="lyric-item" data-index="${index}">
                        <strong>[${timeStr}]</strong> ${lyric.text}
                    </div>`;
                }).join('');
                
                this.elements.lyricsDisplay.innerHTML = lyricsHtml;
            }

            async generateVideo() {
                this.updateStatus('info', '🎬 動画生成中...');
                
                try {
                    await this.setupAudioAnalysis();
                    this.startVisualization();
                    this.elements.playBtn.disabled = false;
                    this.elements.recordBtn.disabled = false;
                    this.updateStatus('success', '✅ 動画生成完了。再生して確認してください');
                } catch (error) {
                    console.error('Video generation error:', error);
                    this.updateStatus('error', '❌ 動画生成に失敗しました');
                }
            }

            async setupAudioAnalysis() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // MediaElementSourceを作成
                const source = this.audioContext.createMediaElementSource(this.audioPlayer);
                this.analyser = this.audioContext.createAnalyser();
                
                // FFTサイズを設定（周波数分析の精度）
                this.analyser.fftSize = 256;
                const bufferLength = this.analyser.frequencyBinCount;
                this.frequencyData = new Uint8Array(bufferLength);
                
                // オーディオルーティング
                source.connect(this.analyser);
                this.analyser.connect(this.audioContext.destination);
            }

            startVisualization() {
                const animate = () => {
                    if (this.audioPlayer.paused && !this.isRecording) {
                        return;
                    }
                    
                    this.drawVisualization();
                    this.animationId = requestAnimationFrame(animate);
                };
                
                animate();
            }

            drawVisualization() {
                // キャンバスをクリア
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 背景画像の描画（設定されている場合）
                this.drawBackground();
                
                // 音声データを取得
                if (this.analyser) {
                    this.analyser.getByteFrequencyData(this.frequencyData);
                }
                
                // 選択されたビジュアルテーマに応じて描画
                const theme = this.elements.visualTheme.value;
                switch (theme) {
                    case 'spectrum':
                        this.drawSpectrum();
                        break;
                    case 'waveform':
                        this.drawWaveform();
                        break;
                    case 'particles':
                        this.drawParticles();
                        break;
                    case 'gradient':
                        this.drawGradient();
                        break;
                }
                
                // 歌詞を描画
                this.drawCurrentLyric();
            }

            drawBackground() {
                const bgImage = this.elements.backgroundImage.value;
                if (bgImage && this.backgroundImg) {
                    this.ctx.globalAlpha = 0.3;
                    this.ctx.drawImage(this.backgroundImg, 0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.globalAlpha = 1.0;
                }
            }

            drawSpectrum() {
                if (!this.frequencyData) return;
                
                const barWidth = this.canvas.width / this.frequencyData.length * 2.5;
                const colorScheme = this.elements.colorScheme.value;
                
                for (let i = 0; i < this.frequencyData.length; i++) {
                    const barHeight = (this.frequencyData[i] / 255) * this.canvas.height * 0.6;
                    
                    const color = this.getColor(i, this.frequencyData.length, colorScheme);
                    this.ctx.fillStyle = color;
                    
                    const x = i * barWidth;
                    const y = this.canvas.height - barHeight;
                    
                    this.ctx.fillRect(x, y, barWidth - 2, barHeight);
                }
            }

            drawWaveform() {
                if (!this.frequencyData) return;
                
                this.ctx.strokeStyle = this.getColor(0, 1, this.elements.colorScheme.value);
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();
                
                const sliceWidth = this.canvas.width / this.frequencyData.length;
                let x = 0;
                
                for (let i = 0; i < this.frequencyData.length; i++) {
                    const v = this.frequencyData[i] / 255;
                    const y = v * this.canvas.height / 2;
                    
                    if (i === 0) {
                        this.ctx.moveTo(x, y);
                    } else {
                        this.ctx.lineTo(x, y);
                    }
                    
                    x += sliceWidth;
                }
                
                this.ctx.stroke();
            }

            drawParticles() {
                if (!this.frequencyData) return;
                
                const centerX = this.canvas.width / 2;
                const centerY = this.canvas.height / 2;
                
                for (let i = 0; i < this.frequencyData.length; i += 4) {
                    const amplitude = this.frequencyData[i] / 255;
                    const angle = (i / this.frequencyData.length) * Math.PI * 2;
                    const radius = amplitude * 200;
                    
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    
                    this.ctx.fillStyle = this.getColor(i, this.frequencyData.length, this.elements.colorScheme.value);
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, amplitude * 8 + 2, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            }

            drawGradient() {
                if (!this.frequencyData) return;
                
                // 平均音量を計算
                const average = this.frequencyData.reduce((a, b) => a + b, 0) / this.frequencyData.length;
                const intensity = average / 255;
                
                // 放射状グラデーション
                const gradient = this.ctx.createRadialGradient(
                    this.canvas.width / 2, this.canvas.height / 2, 0,
                    this.canvas.width / 2, this.canvas.height / 2, this.canvas.width / 2
                );
                
                const color = this.getColor(0, 1, this.elements.colorScheme.value);
                gradient.addColorStop(0, color);
                gradient.addColorStop(1, '#000');
                
                this.ctx.globalAlpha = intensity * 0.8 + 0.2;
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.globalAlpha = 1.0;
            }

            drawCurrentLyric() {
                const currentTime = this.audioPlayer.currentTime;
                let currentLyric = null;
                let newIndex = -1;
                
                for (let i = 0; i < this.lyricsData.length; i++) {
                    if (currentTime >= this.lyricsData[i].startTime && currentTime < this.lyricsData[i].endTime) {
                        currentLyric = this.lyricsData[i];
                        newIndex = i;
                        break;
                    }
                }
                
                // 歌詞表示の更新
                if (newIndex !== this.currentLyricIndex) {
                    this.updateLyricsDisplay(newIndex);
                    this.currentLyricIndex = newIndex;
                }
                
                if (currentLyric) {
                    const fontSize = parseInt(this.elements.fontSize.value);
                    this.ctx.font = `bold ${fontSize}px Arial`;
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    
                    // テキストに影を追加
                    this.ctx.fillStyle = '#000';
                    this.ctx.fillText(currentLyric.text, this.canvas.width / 2 + 2, this.canvas.height - 80 + 2);
                    
                    // メインテキスト
                    this.ctx.fillStyle = '#fff';
                    this.ctx.fillText(currentLyric.text, this.canvas.width / 2, this.canvas.height - 80);
                }
            }

            getColor(index, total, scheme) {
                const hue = (index / total) * 360;
                
                switch (scheme) {
                    case 'blue':
                        return `hsl(${200 + hue * 0.3}, 70%, 50%)`;
                    case 'purple':
                        return `hsl(${280 + hue * 0.3}, 70%, 50%)`;
                    case 'rainbow':
                        return `hsl(${hue}, 70%, 50%)`;
                    case 'fire':
                        return `hsl(${hue * 0.3}, 70%, 50%)`;
                    default:
                        return `hsl(${hue}, 70%, 50%)`;
                }
            }

            updateLyricsDisplay(activeIndex) {
                const lyricItems = this.elements.lyricsDisplay.querySelectorAll('.lyric-item');
                lyricItems.forEach((item, index) => {
                    if (index === activeIndex) {
                        item.classList.add('active');
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        item.classList.remove('active');
                    }
                });
            }

            playPause() {
                if (this.audioPlayer.paused) {
                    if (this.audioContext && this.audioContext.state === 'suspended') {
                        this.audioContext.resume();
                    }
                    this.audioPlayer.play();
                    this.startVisualization();
                    this.elements.playBtn.textContent = '⏸️ 一時停止';
                    this.elements.pauseBtn.disabled = false;
                    this.elements.stopBtn.disabled = false;
                } else {
                    this.audioPlayer.pause();
                    this.elements.playBtn.textContent = '▶️ 再生';
                }
            }

            pause() {
                this.audioPlayer.pause();
                this.elements.playBtn.textContent = '▶️ 再生';
            }

            stop() {
                this.audioPlayer.pause();
                this.audioPlayer.currentTime = 0;
                this.elements.playBtn.textContent = '▶️ 再生';
                this.elements.pauseBtn.disabled = true;
                this.elements.stopBtn.disabled = true;
                this.currentLyricIndex = -1;
                this.updateLyricsDisplay(-1);
                
                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                }
            }

            async toggleRecording() {
                if (!this.isRecording) {
                    await this.startRecording();
                } else {
                    this.stopRecording();
                }
            }

            async startRecording() {
                try {
                    const canvasStream = this.canvas.captureStream(30); // 30fps
                    const audioStream = this.audioContext.createMediaStreamDestination().stream;
                    
                    // 音声とビデオストリームを結合
                    const combinedStream = new MediaStream([
                        ...canvasStream.getVideoTracks(),
                        ...audioStream.getAudioTracks()
                    ]);
                    
                    this.mediaRecorder = new MediaRecorder(combinedStream, {
                        mimeType: 'video/webm; codecs=vp9'
                    });
                    
                    this.recordedChunks = [];
                    
                    this.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            this.recordedChunks.push(event.data);
                        }
                    };
                    
                    this.mediaRecorder.onstop = () => {
                        this.elements.exportBtn.disabled = false;
                        this.updateStatus('success', '✅ 録画完了。動画を保存できます');
                    };
                    
                    this.mediaRecorder.start(1000);
                    this.isRecording = true;
                    this.elements.recordBtn.textContent = '⏹️ 録画停止';
                    this.elements.recordBtn.classList.add('btn-record');
                    this.updateStatus('recording', '🔴 録画中...');
                    
                } catch (error) {
                    console.error('Recording start error:', error);
                    this.updateStatus('error', '❌ 録画の開始に失敗しました');
                }
            }

            stopRecording() {
                if (this.mediaRecorder && this.isRecording) {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    this.elements.recordBtn.textContent = '🎥 録画開始';
                    this.elements.recordBtn.classList.remove('btn-record');
                }
            }

            exportVideo() {
                if (this.recordedChunks.length === 0) {
                    this.updateStatus('error', '❌ 録画データがありません');
                    return;
                }
                
                const blob = new Blob(this.recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `music-video-${Date.now()}.webm`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                URL.revokeObjectURL(url);
                this.updateStatus('success', '✅ 動画を保存しました');
            }

            updateProgress() {
                const currentTime = this.audioPlayer.currentTime;
                const duration = this.audioPlayer.duration;
                
                if (duration > 0) {
                    const progress = (currentTime / duration) * 100;
                    this.elements.progressBar.style.width = `${progress}%`;
                    
                    const currentStr = this.formatTime(currentTime);
                    const durationStr = this.formatTime(duration);
                    this.elements.timeDisplay.textContent = `${currentStr} / ${durationStr}`;
                }
            }

            updateDuration() {
                if (this.audioPlayer.duration) {
                    const durationStr = this.formatTime(this.audioPlayer.duration);
                    this.elements.timeDisplay.textContent = `00:00 / ${durationStr}`;
                }
            }

            handleAudioEnd() {
                this.stop();
                if (this.isRecording) {
                    this.stopRecording();
                }
            }

            updateVisualSettings() {
                // 背景画像の読み込み
                const bgImageUrl = this.elements.backgroundImage.value;
                if (bgImageUrl && bgImageUrl !== this.lastBgImageUrl) {
                    this.backgroundImg = new Image();
                    this.backgroundImg.crossOrigin = 'anonymous';
                    this.backgroundImg.src = bgImageUrl;
                    this.lastBgImageUrl = bgImageUrl;
                }
            }

            formatTime(seconds) {
                const minutes = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            updateStatus(type, message) {
                this.elements.status.className = `status ${type}`;
                this.elements.status.textContent = message;
            }
        }

        // アプリ初期化
        document.addEventListener('DOMContentLoaded', () => {
            new MusicVideoCreator();
        });
    </script>
</body>
</html>
