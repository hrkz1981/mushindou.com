<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Calm Tokyo — サムネイルジェネレーター</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#0d0d0d;color:#e0e0e0;display:flex;min-height:100vh}

    /* ===== 左パネル ===== */
    .panel{width:340px;min-width:340px;background:#161616;border-right:1px solid #2a2a2a;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px}
    .panel-title{font-size:16px;font-weight:700;color:#fff;border-bottom:2px solid #ff6b35;padding-bottom:10px;display:flex;align-items:center;gap:8px}
    .panel-title span{color:#ff6b35}

    .sec{background:#1e1e1e;border-radius:10px;padding:14px}
    .sec h3{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}

    label{display:block;font-size:11px;color:#999;margin-bottom:4px}
    input[type=text],select,textarea{width:100%;background:#272727;border:1px solid #3a3a3a;border-radius:6px;color:#e0e0e0;padding:8px 10px;font-size:13px;outline:none;transition:border-color .15s}
    input[type=text]:focus,select:focus{border-color:#ff6b35}
    input[type=color]{width:100%;height:34px;border:1px solid #3a3a3a;border-radius:6px;background:#272727;padding:2px;cursor:pointer}
    input[type=range]{width:100%;accent-color:#ff6b35}
    .fld{margin-bottom:11px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .rv{display:flex;align-items:center;gap:8px}
    .rv input{flex:1}
    .rv span{min-width:32px;font-size:11px;color:#aaa;text-align:right}

    /* テンプレートカード */
    .tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:2px}
    .tpl{border-radius:8px;height:56px;cursor:pointer;border:2px solid transparent;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:6px;transition:border-color .15s,transform .1s}
    .tpl:hover{transform:scale(1.03)}
    .tpl.active{border-color:#fff}
    .tpl span{font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9);line-height:1.2}

    /* ドロップゾーン */
    .drop{border:2px dashed #3a3a3a;border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:border-color .15s;font-size:12px;color:#666}
    .drop:hover,.drop.over{border-color:#ff6b35;color:#ccc}
    .drop img{max-height:70px;max-width:100%;border-radius:4px;margin-top:6px}
    input[type=file]{display:none}

    /* ボタン */
    .btn-dl{width:100%;padding:13px;background:linear-gradient(135deg,#ff6b35,#ff3366);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
    .btn-dl:hover{opacity:.88}
    .btn2{width:100%;padding:9px;background:#2a2a2a;color:#ccc;border:1px solid #3a3a3a;border-radius:8px;font-size:12px;cursor:pointer;margin-top:7px}
    .btn2:hover{background:#333}

    /* ===== 右：プレビュー ===== */
    .preview{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:28px;gap:16px;overflow-y:auto}
    .badge{background:#222;color:#888;padding:4px 14px;border-radius:20px;font-size:11px}
    .cw{box-shadow:0 10px 50px rgba(0,0,0,.9);border-radius:4px;overflow:hidden}
    #cv{display:block;max-width:calc(100vw - 390px);height:auto}
  </style>
</head>
<body>

<div class="panel">
  <div class="panel-title">🎵 <span>Calm Tokyo</span> サムネ</div>

  <!-- テンプレート -->
  <div class="sec">
    <h3>テンプレート</h3>
    <div class="tpl-grid" id="tplGrid">
      <div class="tpl active" data-tpl="morning"
        style="background:linear-gradient(135deg,#f6d365,#fda085)"
        onclick="applyTemplate('morning',this)">
        <span>☀️ Morning<br>Cozy</span>
      </div>
      <div class="tpl" data-tpl="night"
        style="background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)"
        onclick="applyTemplate('night',this)">
        <span>🌙 Night<br>Stories</span>
      </div>
      <div class="tpl" data-tpl="spring"
        style="background:linear-gradient(135deg,#f8cdda,#1d6fa4)"
        onclick="applyTemplate('spring',this)">
        <span>🌸 Spring<br>Morning</span>
      </div>
      <div class="tpl" data-tpl="neon"
        style="background:linear-gradient(135deg,#0d0221,#7b2d8b,#ff6ec7)"
        onclick="applyTemplate('neon',this)">
        <span>⚡ Neon<br>Tokyo</span>
      </div>
      <div class="tpl" data-tpl="autumn"
        style="background:linear-gradient(135deg,#c47e17,#8b3a0f)"
        onclick="applyTemplate('autumn',this)">
        <span>🍂 Autumn<br>Evening</span>
      </div>
      <div class="tpl" data-tpl="midnight"
        style="background:linear-gradient(135deg,#0f2027,#203a43,#2c5364)"
        onclick="applyTemplate('midnight',this)">
        <span>🌃 Midnight<br>Café</span>
      </div>
    </div>
  </div>

  <!-- テキスト -->
  <div class="sec">
    <h3>テキスト</h3>
    <div class="fld">
      <label>メインタイトル（改行可：\n）</label>
      <input type="text" id="mainTitle" value="Slow Sunday Morning">
    </div>
    <div class="fld">
      <label>サブタイトル</label>
      <input type="text" id="subTitle" value="Calm Lofi Jazz · コーヒーと静かな朝">
    </div>
    <div class="fld">
      <label>タグ / シリーズ名（右下に小さく）</label>
      <input type="text" id="tagText" value="Calm Tokyo">
    </div>
    <div class="fld">
      <label>テキスト配置</label>
      <select id="textPos">
        <option value="topleft">左上（Morning Stories風）</option>
        <option value="topcenter">上中央（タイトルのみ大きく）</option>
        <option value="center">中央</option>
        <option value="bottomleft">左下</option>
      </select>
    </div>
    <div class="row2">
      <div class="fld">
        <label>タイトル色</label>
        <input type="color" id="titleColor" value="#ffffff">
      </div>
      <div class="fld">
        <label>サブ色</label>
        <input type="color" id="subColor" value="#ffe0b2">
      </div>
    </div>
    <div class="fld">
      <label>タイトルサイズ</label>
      <div class="rv">
        <input type="range" id="titleSize" min="32" max="110" value="72">
        <span id="titleSizeV">72</span>
      </div>
    </div>
  </div>

  <!-- 背景イラスト -->
  <div class="sec">
    <h3>背景イラスト（AI生成画像など）</h3>
    <div class="drop" id="bgDrop" onclick="document.getElementById('bgFile').click()">
      <div id="bgDropTxt">クリック or ドロップで画像を追加</div>
      <img id="bgThumb" style="display:none">
    </div>
    <input type="file" id="bgFile" accept="image/*">

    <div class="fld" style="margin-top:10px">
      <label>カラーオーバーレイ（暗さ・色味）</label>
      <div class="rv">
        <input type="range" id="overlayA" min="0" max="80" value="30">
        <span id="overlayAV">30%</span>
      </div>
    </div>
    <div class="fld">
      <label>オーバーレイ色</label>
      <input type="color" id="overlayColor" value="#1a0a00">
    </div>
    <div class="fld">
      <label>ビネット（周辺暗化）</label>
      <div class="rv">
        <input type="range" id="vignette" min="0" max="100" value="40">
        <span id="vignetteV">40</span>
      </div>
    </div>
  </div>

  <!-- 装飾 -->
  <div class="sec">
    <h3>装飾ライン</h3>
    <div class="fld">
      <label>スタイル</label>
      <select id="decorStyle">
        <option value="none">なし</option>
        <option value="leftbar">左アクセントバー</option>
        <option value="underline">タイトル下線</option>
        <option value="topbar">上部ライン</option>
        <option value="corner">角フレーム</option>
      </select>
    </div>
    <div class="fld">
      <label>アクセントカラー</label>
      <input type="color" id="accentColor" value="#ff6b35">
    </div>
  </div>

  <!-- 保存 -->
  <div class="sec">
    <button class="btn-dl" onclick="downloadPNG()">💾 PNG ダウンロード（1280×720）</button>
    <button class="btn2" onclick="copyClip()">📋 クリップボードにコピー</button>
  </div>
</div>

<!-- プレビュー -->
<div class="preview">
  <div class="badge">1280 × 720 px</div>
  <div class="cw"><canvas id="cv" width="1280" height="720"></canvas></div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

const S = {
  bgImage: null,
  overlayA: 0.30,
  overlayColor: '#1a0a00',
  vignette: 40,
  mainTitle: 'Slow Sunday Morning',
  subTitle: 'Calm Lofi Jazz · コーヒーと静かな朝',
  tagText: 'Calm Tokyo',
  textPos: 'topleft',
  titleColor: '#ffffff',
  subColor: '#ffe0b2',
  titleSize: 72,
  decorStyle: 'none',
  accentColor: '#ff6b35',
  // グラデーションBG（画像なし時）
  gradA: '#f6d365',
  gradB: '#fda085',
  gradAngle: 135,
};

// ===== テンプレート定義 =====
const TEMPLATES = {
  morning: {
    gradA:'#f6a623', gradB:'#e8845c', gradAngle:135,
    overlayColor:'#3d1a00', overlayA:0.25, vignette:45,
    titleColor:'#ffffff', subColor:'#ffe0b2',
    decorStyle:'leftbar', accentColor:'#ff8c00',
    textPos:'topleft', titleSize:72
  },
  night: {
    gradA:'#0a0a1a', gradB:'#1a2a4a', gradAngle:160,
    overlayColor:'#000020', overlayA:0.35, vignette:60,
    titleColor:'#ffffff', subColor:'#a0c4ff',
    decorStyle:'topbar', accentColor:'#5b8dee',
    textPos:'topcenter', titleSize:80
  },
  spring: {
    gradA:'#f9cfe7', gradB:'#b5c6f0', gradAngle:150,
    overlayColor:'#200010', overlayA:0.20, vignette:30,
    titleColor:'#ffffff', subColor:'#ffd6e7',
    decorStyle:'leftbar', accentColor:'#ff69b4',
    textPos:'topleft', titleSize:68
  },
  neon: {
    gradA:'#0d0221', gradB:'#2d0845', gradAngle:135,
    overlayColor:'#000000', overlayA:0.40, vignette:70,
    titleColor:'#ff6ec7', subColor:'#b0ffe8',
    decorStyle:'leftbar', accentColor:'#ff00aa',
    textPos:'bottomleft', titleSize:80
  },
  autumn: {
    gradA:'#c47e17', gradB:'#6b2000', gradAngle:145,
    overlayColor:'#1a0a00', overlayA:0.30, vignette:50,
    titleColor:'#fff8e1', subColor:'#ffcc80',
    decorStyle:'leftbar', accentColor:'#ff6d00',
    textPos:'topleft', titleSize:72
  },
  midnight: {
    gradA:'#0f2027', gradB:'#2c5364', gradAngle:140,
    overlayColor:'#000a10', overlayA:0.38, vignette:55,
    titleColor:'#e0f2ff', subColor:'#80deea',
    decorStyle:'topbar', accentColor:'#00bcd4',
    textPos:'topcenter', titleSize:76
  },
};

function applyTemplate(name, el) {
  const t = TEMPLATES[name];
  Object.assign(S, t);
  // UI反映
  document.getElementById('overlayColor').value = t.overlayColor;
  document.getElementById('overlayA').value = Math.round(t.overlayA * 100);
  document.getElementById('overlayAV').textContent = Math.round(t.overlayA * 100) + '%';
  document.getElementById('vignette').value = t.vignette;
  document.getElementById('vignetteV').textContent = t.vignette;
  document.getElementById('titleColor').value = t.titleColor;
  document.getElementById('subColor').value = t.subColor;
  document.getElementById('decorStyle').value = t.decorStyle;
  document.getElementById('accentColor').value = t.accentColor;
  document.getElementById('textPos').value = t.textPos;
  document.getElementById('titleSize').value = t.titleSize;
  document.getElementById('titleSizeV').textContent = t.titleSize;
  document.querySelectorAll('.tpl').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ===== 入力バインド =====
function b(id, key, fn) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => { S[key] = fn ? fn(el.value) : el.value; render(); });
}
b('mainTitle','mainTitle'); b('subTitle','subTitle'); b('tagText','tagText');
b('textPos','textPos'); b('titleColor','titleColor'); b('subColor','subColor');
b('decorStyle','decorStyle'); b('accentColor','accentColor');
b('overlayColor','overlayColor');
b('titleSize','titleSize', v => { document.getElementById('titleSizeV').textContent=v; return+v; });
b('overlayA','overlayA', v => { document.getElementById('overlayAV').textContent=v+'%'; return+v/100; });
b('vignette','vignette', v => { document.getElementById('vignetteV').textContent=v; return+v; });

// ===== 画像ドロップ =====
function imgDrop(dropId, fileId, thumbId, txtId, key) {
  const zone = document.getElementById(dropId);
  const inp = document.getElementById(fileId);
  function load(file) {
    if (!file?.type.startsWith('image/')) return;
    const fr = new FileReader();
    fr.onload = e => {
      const img = new Image();
      img.onload = () => { S[key]=img; document.getElementById(thumbId).src=e.target.result; document.getElementById(thumbId).style.display='block'; document.getElementById(txtId).style.display='none'; render(); };
      img.src = e.target.result;
    };
    fr.readAsDataURL(file);
  }
  inp.addEventListener('change', e => load(e.target.files[0]));
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('over'); load(e.dataTransfer.files[0]); });
}
imgDrop('bgDrop','bgFile','bgThumb','bgDropTxt','bgImage');

// ===== レンダリング =====
function hex2rgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function getGradCoords(angle, w, h) {
  const rad = (angle-90)*Math.PI/180;
  const cos=Math.cos(rad), sin=Math.sin(rad);
  const len = Math.abs(cos)*w/2 + Math.abs(sin)*h/2;
  return { x1:w/2-cos*len, y1:h/2-sin*len, x2:w/2+cos*len, y2:h/2+sin*len };
}

function drawBG() {
  if (S.bgImage) {
    const img=S.bgImage, sc=Math.max(1280/img.width, 720/img.height);
    ctx.drawImage(img, (1280-img.width*sc)/2, (720-img.height*sc)/2, img.width*sc, img.height*sc);
  } else {
    const c = getGradCoords(S.gradAngle, 1280, 720);
    const g = ctx.createLinearGradient(c.x1,c.y1,c.x2,c.y2);
    g.addColorStop(0, S.gradA); g.addColorStop(1, S.gradB);
    ctx.fillStyle = g; ctx.fillRect(0,0,1280,720);
  }
  // カラーオーバーレイ
  if (S.overlayA > 0) {
    ctx.fillStyle = hex2rgba(S.overlayColor, S.overlayA);
    ctx.fillRect(0,0,1280,720);
  }
  // ビネット
  if (S.vignette > 0) {
    const vg = ctx.createRadialGradient(640,360,200, 640,360,850);
    vg.addColorStop(0,'transparent');
    vg.addColorStop(1, `rgba(0,0,0,${S.vignette/100})`);
    ctx.fillStyle = vg; ctx.fillRect(0,0,1280,720);
  }
}

function drawDecor(tx, ty, tw) {
  if (S.decorStyle==='none') return;
  ctx.shadowColor='transparent'; ctx.shadowBlur=0;
  ctx.fillStyle = S.accentColor;
  if (S.decorStyle==='leftbar') {
    ctx.fillRect(40, ty-S.titleSize*1.4, 6, S.titleSize*2.2);
  } else if (S.decorStyle==='underline') {
    ctx.fillRect(tx, ty+10, tw, 4);
  } else if (S.decorStyle==='topbar') {
    ctx.fillRect(0, 0, 1280, 5);
  } else if (S.decorStyle==='corner') {
    const t=5; ctx.fillRect(20,20,120,t); ctx.fillRect(20,20,t,80);
    ctx.fillRect(1260-120,20,120,t); ctx.fillRect(1260-t,20,t,80);
    ctx.fillRect(20,700-t,120,t); ctx.fillRect(20,700-80,t,80);
    ctx.fillRect(1260-120,700-t,120,t); ctx.fillRect(1260-t,700-80,t,80);
  }
}

function setShadow(strong) {
  if (strong) {
    ctx.shadowColor='rgba(0,0,0,0.95)'; ctx.shadowBlur=16; ctx.shadowOffsetX=2; ctx.shadowOffsetY=2;
  } else {
    ctx.shadowColor='rgba(0,0,0,0.7)'; ctx.shadowBlur=10; ctx.shadowOffsetX=1; ctx.shadowOffsetY=1;
  }
}
function clrShadow() { ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0; }

function drawText() {
  const pos = S.textPos;
  const fs = S.titleSize;
  const font = "'Arial Black', 'Noto Sans JP', sans-serif";
  const lines = S.mainTitle.split('\\n');

  let tx, ty, align;
  if (pos==='topleft')    { tx=68; ty=80; align='left'; }
  else if (pos==='topcenter') { tx=640; ty=80; align='center'; }
  else if (pos==='center')    { tx=640; ty=320; align='center'; }
  else                        { tx=68; ty=520; align='left'; }

  ctx.textAlign = align;

  // タイトル
  ctx.font = `900 ${fs}px ${font}`;
  setShadow(true);
  ctx.fillStyle = S.titleColor;

  const lineH = fs * 1.15;
  lines.forEach((line, i) => {
    ctx.fillText(line, tx, ty + fs + i * lineH);
  });

  const titleBottom = ty + fs + (lines.length - 1) * lineH;
  const firstLineW = ctx.measureText(lines[0]).width;

  // 装飾
  drawDecor(align==='center' ? tx - firstLineW/2 : tx, ty, firstLineW);

  // サブタイトル
  if (S.subTitle) {
    ctx.font = `500 ${Math.round(fs*0.35)}px ${font}`;
    setShadow(false);
    ctx.fillStyle = S.subColor;
    ctx.fillText(S.subTitle, tx, titleBottom + fs * 0.6);
  }

  // タグ（右下）
  if (S.tagText) {
    ctx.textAlign = 'right';
    ctx.font = `600 22px ${font}`;
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    clrShadow();
    ctx.fillText(S.tagText, 1250, 700);
  }

  clrShadow();
}

function render() {
  ctx.clearRect(0,0,1280,720);
  drawBG();
  drawText();
}

// ===== ダウンロード =====
function downloadPNG() {
  render();
  const a = document.createElement('a');
  const name = S.mainTitle.replace(/[\\/:*?"<>|\n]/g,'_') || 'thumbnail';
  a.download = `${name}.png`;
  a.href = cv.toDataURL('image/png');
  a.click();
}

async function copyClip() {
  render();
  cv.toBlob(async b => {
    try { await navigator.clipboard.write([new ClipboardItem({'image/png':b})]); alert('コピーしました！'); }
    catch { alert('PNGダウンロードをご利用ください'); }
  });
}

// 初期描画
render();
</script>
</body>
</html>
